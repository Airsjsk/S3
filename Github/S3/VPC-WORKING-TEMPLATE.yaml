AWSTemplateFormatVersion: '2010-09-09'
Description: VPC spanning 3 AZs in us-west-2

Parameters:
  StudentID:
    Type: String
    Description: ECPI Student ID used for resource naming

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "VPC-${StudentID}"

  SubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-west-2a
      Tags:
        - Key: Name
          Value: !Sub "VPC-${StudentID}-subnet-a"

  SubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: us-west-2b
      Tags:
        - Key: Name
          Value: !Sub "VPC-${StudentID}-subnet-b"

  SubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: us-west-2c
      Tags:
        - Key: Name
          Value: !Sub "VPC-${StudentID}-subnet-c"

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  SubnetIds:
    Description: Comma-delimited list of subnet IDs
    Value: !Join
      - ","
      - - !Ref SubnetA
        - !Ref SubnetB
        - !Ref SubnetC